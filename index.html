<meta property="og:title" content="國中數感實驗室 Junior Math Lab">

<body>
<header>
  <button id="voice-btn" title="示範旁白語音開關">🔇</button>
  <button id="theme-btn" title="切換深色 / 淺色">🌙</button>
  <h1>國中數感實驗室 <span class="en">Junior Math Lab</span></h1>

<main>
  <section id="panel">

    <div id="readout"></div>
    <canvas id="board" width="680" height="680"></canvas>
